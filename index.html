<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femboy Chat • Regular / Freaky</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h1>Femboy Chat</h1>
    </div>

    <div class="mode-toggle">
        <span class="toggle-label">Regular Mode</span>
        <label class="switch">
            <input type="checkbox" id="modeToggle">
            <span class="slider"></span>
        </label>
        <span class="toggle-label">Freaky Mode 👅💦</span>
    </div>

    <div class="chat-container">
        <div class="chat-header" id="chatTitle">
            Hewwo~ I'm your cute femboy! (✿◕‿◕)
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="typing-indicator" id="typing">
            <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Say something to your femboy..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script src="js/regular.js"></script>
    <script src="js/freaky.js"></script>
    <script>
        let isFreaky = false;

        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');
        const chatTitle = document.getElementById('chatTitle');
        const modeToggle = document.getElementById('modeToggle');

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function botReply(userText) {
            typing.style.display = 'block';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            await new Promise(r => setTimeout(r, 700 + Math.random() * 800));

            typing.style.display = 'none';

            let reply;
            if (isFreaky) {
                reply = getFreakyResponse(userText);
            } else {
                reply = getRandomRegularResponse();
            }

            addMessage(reply, 'bot');
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            botReply(text);
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        modeToggle.addEventListener('change', () => {
            isFreaky = modeToggle.checked;

            if (isFreaky) {
                chatTitle.textContent = "Freaky Femboy Mode 👅💦";
                chatTitle.style.background = 'linear-gradient(to right, #ff1493, #8b008b)';
                addMessage("Mmm~ I've been waiting so long... What do you want to do to your needy little toy first, master? 👅💦", 'bot');
            } else {
                chatTitle.textContent = "Hewwo~ I'm your cute femboy! (✿◕‿◕)";
                chatTitle.style.background = 'linear-gradient(to right, #ff69b4, #ff1493)';
                addMessage("Back to soft & cuddly mode~ Hewwo again! ♡", 'bot');
            }
        });

        // Initial greeting
        window.onload = () => {
            setTimeout(() => {
                addMessage("Hewwo~! I'm your femboy AI ♡ What would you like to talk about today?", 'bot');
            }, 400);
        };
    </script>
</body>
</html>
